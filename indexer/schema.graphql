type FeeUpdated @entity(immutable: true) {
  id: Bytes!
  newFeeBps: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type FeesWithdrawn @entity(immutable: true) {
  id: Bytes!
  to: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnerUpdated @entity(immutable: true) {
  id: Bytes!
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PlanCreated @entity(immutable: true) {
  id: Bytes!
  planId: Bytes! # bytes32
  seller: Bytes! # address
  duration: BigInt! # uint32
  ipfsHash: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type TierAdded @entity(immutable: true) {
  id: Bytes!
  planId: Bytes! # bytes32
  tierId: BigInt! # uint256
  price: BigInt! # uint256
  label: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PlanStatusUpdated @entity(immutable: true) {
  id: Bytes!
  planId: Bytes! # bytes32
  active: Boolean! # bool
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PlanUpdated @entity(immutable: true) {
  id: Bytes!
  planId: Bytes! # bytes32
  duration: BigInt! # uint32
  ipfsHash: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Subscribed @entity(immutable: true) {
  id: Bytes!
  subscriber: Bytes! # address
  seller: Bytes! # address
  plan: Plan! # LINKED FIELD
  planId: Bytes! # bytes32
  tierId: BigInt! # uint256
  tier: Tier
  totalAmount: BigInt! # uint256
  feeAmount: BigInt! # uint256
  buyerData: String! # string
  startTime: BigInt! # uint32
  endTime: BigInt! # uint32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type GlobalConfig @entity(immutable: false) {
  id: String!
  owner: Bytes
  feeBps: BigInt!
  updatedAt: BigInt!
  updatedBlock: BigInt!
}

type Seller @entity(immutable: false) {
  id: Bytes!
  planCount: Int!
  activePlanCount: Int!
  subscriptionCount: Int!
  totalGrossRevenue: BigInt!
  totalNetRevenue: BigInt!
  totalFeeContributed: BigInt!
  totalFeeWithdrawn: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Subscriber @entity(immutable: false) {
  id: Bytes!
  subscriptionCount: Int!
  activeSubscriptionCount: Int!
  totalSpent: BigInt!
  totalFeesPaid: BigInt!
  firstSeenAt: BigInt!
  updatedAt: BigInt!
}

type Plan @entity(immutable: false) {
  id: Bytes!
  seller: Seller!
  duration: BigInt!
  ipfsHash: String!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
  subscriptionCount: Int!
  totalGrossVolume: BigInt!
  totalFeesCollected: BigInt!
  lastSubscriptionAt: BigInt
  tiers: [Tier!]! @derivedFrom(field: "plan")
  subscriptions: [Subscribed!]! @derivedFrom(field: "plan")
  subscriptionStates: [SubscriptionState!]! @derivedFrom(field: "plan")
}

type Tier @entity(immutable: false) {
  id: String! # planId-tierId
  plan: Plan!
  tierId: BigInt!
  price: BigInt!
  label: String!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

enum SubscriptionStatus {
  ACTIVE
  EXPIRED
}

type SubscriptionState @entity(immutable: false) {
  id: String!
  subscriber: Subscriber!
  seller: Seller!
  plan: Plan!
  status: SubscriptionStatus!
  subscriptionCount: Int!
  totalSpent: BigInt!
  totalFeesPaid: BigInt!
  firstStartTime: BigInt!
  lastStartTime: BigInt!
  lastEndTime: BigInt!
  lastBuyerData: String!
  lastTierId: BigInt!
  firstSeenAt: BigInt!
  updatedAt: BigInt!
  lastTxHash: Bytes!
}

type DailyStats @entity(immutable: false) {
  id: String!
  dayStartTimestamp: BigInt!
  plansCreated: Int!
  subscriptionsCreated: Int!
  totalGrossVolume: BigInt!
  totalFeesCollected: BigInt!
  totalFeeWithdrawals: BigInt!
  updatedAt: BigInt!
}

type MonthlyStats @entity(immutable: false) {
  id: String! # month bucket
  monthStartTimestamp: BigInt!
  plansCreated: Int!
  subscriptionsCreated: Int!
  totalGrossVolume: BigInt!
  totalFeesCollected: BigInt!
  totalFeeWithdrawals: BigInt!
  updatedAt: BigInt!
}

type Transaction @entity(immutable: true) {
  id: Bytes!
  type: String! # CREATE_PLAN, UPDATE_PLAN, SUBSCRIBE, WITHDRAW, SET_FEE
  from: Bytes!
  to: Bytes
  amount: BigInt
  fee: BigInt
  plan: Plan
  seller: Seller
  subscriber: Subscriber
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PlanUpdate @entity(immutable: true) {
  id: Bytes!
  plan: Plan!
  oldDuration: BigInt
  newDuration: BigInt!
  oldIpfsHash: String
  newIpfsHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
