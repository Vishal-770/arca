specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SubscriptionGateway
    network: arc-testnet
    source:
      address: "0x094D8A6dEDF25ee8ccFe093ac48514B83b7e73D2"
      abi: SubscriptionGateway
      startBlock: 43961192
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalConfig
        - Seller
        - Subscriber
        - Plan
        - Tier
        - SubscriptionState
        - DailyStats
        - MonthlyStats
        - FeeUpdated
        - FeesWithdrawn
        - OwnerUpdated
        - PlanCreated
        - TierAdded
        - PlanStatusUpdated
        - PlanUpdated
        - Subscribed
        - Transaction
        - PlanUpdate
      abis:
        - name: SubscriptionGateway
          file: ./abis/SubscriptionGateway.json
      eventHandlers:
        - event: FeeUpdated(uint256)
          handler: handleFeeUpdated
        - event: FeesWithdrawn(indexed address,uint256)
          handler: handleFeesWithdrawn
        - event: OwnerUpdated(indexed address)
          handler: handleOwnerUpdated
        - event: PlanCreated(indexed bytes32,indexed address,uint32,string)
          handler: handlePlanCreated
        - event: TierAdded(indexed bytes32,uint256,uint256,string)
          handler: handleTierAdded
        - event: PlanStatusUpdated(indexed bytes32,bool)
          handler: handlePlanStatusUpdated
        - event: PlanUpdated(indexed bytes32,uint32,string)
          handler: handlePlanUpdated
        - event: Subscribed(indexed address,indexed address,indexed bytes32,uint256,uint256,uint256,string,uint32,uint32)
          handler: handleSubscribed
      file: ./src/subscription-gateway.ts
